# Railway deployment config — wired up and ready for Phase 8
# Deployment itself does NOT happen until Phase 8.

[build]
builder = "nixpacks"
# NODE_ENV=production (set at runtime via [[envVars]] below) makes npm ci skip
# devDependencies by default. But the build phase NEEDS devDeps — tsc, husky,
# and other build tools all live there. Explicit installCommand forces a full
# install regardless of NODE_ENV.
installCommand = "npm ci --include=dev"
buildCommand = "npm run build --workspace=server"

[deploy]
startCommand = "node server/dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[envVars]]
name = "NODE_ENV"
value = "production"
